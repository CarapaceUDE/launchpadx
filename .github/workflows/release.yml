name: Build and release

# Reusable native release builder for Rust desktop applications.
# Copy this file to another repository and change the defaults below.
on:
  workflow_call:
    inputs:
      tag:
        description: Existing version tag to release
        required: true
        type: string
      binary-name:
        description: Cargo binary name (without .exe)
        required: false
        default: launchpadx
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release (for example, v0.1.0)
        required: true
        type: string
      binary-name:
        description: Cargo binary name (without .exe)
        required: false
        default: launchpadx
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve and validate tag
        id: release
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${REQUESTED_TAG:-$EVENT_TAG}"
          case "$tag" in
            v[0-9]*) ;;
            *) echo "Tag must look like v0.1.0 (received: $tag)" >&2; exit 1 ;;
          esac
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft --generate-notes --title "$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            target: x86_64-pc-windows-msvc
            extension: .exe
            archive: zip
          - os: macos-latest
            label: macOS Apple Silicon
            target: aarch64-apple-darwin
            extension: ""
            archive: tar.gz
          - os: ubuntu-22.04
            label: Linux x64
            target: x86_64-unknown-linux-gnu
            extension: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        working-directory: web
        run: npm ci && npm run build

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
        run: cargo build --locked --release --bin "$BINARY_NAME" --target ${{ matrix.target }}
        shell: bash

      - name: Package Unix binary
        if: runner.os != 'Windows'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          mkdir -p "$package/web" "$package/assets"
          cp "target/$TARGET/release/$BINARY_NAME" README.md LICENSE config.example.json "$package/"
          cp -R web/dist "$package/web/dist"
          cp assets/icon.png "$package/assets/icon.png"
          tar -czf "$package.tar.gz" "$package"
        shell: bash

      - name: Package Windows binary
        if: runner.os == 'Windows'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          mkdir -p "$package/web" "$package/assets"
          cp "target/$TARGET/release/$BINARY_NAME.exe" README.md LICENSE config.example.json "$package/"
          cp -R web/dist "$package/web/dist"
          cp assets/icon.png "$package/assets/icon.png"
          7z a "$package.zip" "./$package/*"
        shell: bash

      - name: Smoke-test packaged web UI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $package = "$env:BINARY_NAME-$env:TAG-$env:TARGET"
          $process = Start-Process -FilePath "$package/$env:BINARY_NAME.exe" `
            -ArgumentList "--serve-only", "--port", "4173" `
            -WorkingDirectory $package -PassThru -WindowStyle Hidden
          try {
            $response = $null
            for ($attempt = 0; $attempt -lt 20; $attempt++) {
              Start-Sleep -Milliseconds 500
              if ($process.HasExited) {
                throw "Packaged executable exited before serving the UI (code $($process.ExitCode))"
              }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:4173" -UseBasicParsing
                break
              } catch {}
            }
            if (-not $response -or $response.StatusCode -ne 200 -or $response.Content -notmatch '<div id="root">') {
              throw "Packaged executable did not serve the web UI"
            }
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

      - name: Upload directly to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: gh release upload "$TAG" "$BINARY_NAME-$TAG-$TARGET.$ARCHIVE" --clobber --repo "$GITHUB_REPOSITORY"
        shell: bash

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft after every platform succeeds
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
