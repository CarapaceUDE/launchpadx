name: Build and release

# Reusable native release builder for Rust desktop applications.
# Copy this file to another repository and change the defaults below.
on:
  workflow_call:
    inputs:
      tag:
        description: Existing version tag to release
        required: true
        type: string
      binary-name:
        description: Cargo binary name (without .exe)
        required: false
        default: launchpadx
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release (for example, v0.1.0)
        required: true
        type: string
      binary-name:
        description: Cargo binary name (without .exe)
        required: false
        default: launchpadx
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve and validate tag
        id: release
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${REQUESTED_TAG:-$EVENT_TAG}"
          case "$tag" in
            v[0-9]*) ;;
            *) echo "Tag must look like v0.1.0 (received: $tag)" >&2; exit 1 ;;
          esac
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft --generate-notes --title "$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            target: x86_64-pc-windows-msvc
            extension: .exe
            archive: zip
          - os: macos-latest
            label: macOS Universal
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            extension: ""
            archive: tar.gz
          - os: ubuntu-22.04
            label: Linux x64
            target: x86_64-unknown-linux-gnu
            extension: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        working-directory: web
        run: npm ci && npm run build

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev pkg-config xvfb

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        if: runner.os != 'macOS'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
        run: cargo build --locked --release --bin "$BINARY_NAME" --target ${{ matrix.target }}
        shell: bash

      - name: Build universal macOS binary
        if: runner.os == 'macOS'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TARGET: ${{ matrix.target }}
        run: |
          cargo build --locked --release --bin "$BINARY_NAME" --target aarch64-apple-darwin
          cargo build --locked --release --bin "$BINARY_NAME" --target x86_64-apple-darwin
          mkdir -p "target/$TARGET/release"
          lipo -create \
            "target/aarch64-apple-darwin/release/$BINARY_NAME" \
            "target/x86_64-apple-darwin/release/$BINARY_NAME" \
            -output "target/$TARGET/release/$BINARY_NAME"
          lipo -info "target/$TARGET/release/$BINARY_NAME"
        shell: bash

      - name: Package Unix binary
        if: runner.os != 'Windows'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          mkdir -p "$package/web" "$package/assets"
          cp "target/$TARGET/release/$BINARY_NAME" README.md LICENSE config.example.json "$package/"
          cp -R web/dist "$package/web/dist"
          cp assets/icon.png "$package/assets/icon.png"
          tar -czf "$package.tar.gz" "$package"
        shell: bash

      - name: Add macOS app bundle
        if: runner.os == 'macOS'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          app="$package/LaunchPadX.app"
          version="${TAG#v}"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources/web" "$app/Contents/Resources/assets"
          cp "$package/$BINARY_NAME" "$app/Contents/MacOS/$BINARY_NAME"
          cp -R web/dist "$app/Contents/Resources/web/dist"
          cp assets/icon.png "$app/Contents/Resources/assets/icon.png"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            "<key>CFBundleExecutable</key><string>$BINARY_NAME</string>" \
            '<key>CFBundleIdentifier</key><string>org.carapaceai.launchpadx</string>' \
            '<key>CFBundleName</key><string>LaunchPadX</string>' \
            '<key>CFBundleDisplayName</key><string>LaunchPadX</string>' \
            "<key>CFBundleShortVersionString</key><string>$version</string>" \
            '<key>CFBundlePackageType</key><string>APPL</string>' \
            '<key>NSHighResolutionCapable</key><true/>' \
            '</dict></plist>' > "$app/Contents/Info.plist"
          plutil -lint "$app/Contents/Info.plist"
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict "$app"
          rm "$package.tar.gz"
          tar -czf "$package.tar.gz" "$package"
        shell: bash

      - name: Check macOS app bundle startup
        if: runner.os == 'macOS'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          app="$package/LaunchPadX.app"
          open -W "$app" >gui-stdout.log 2>gui-stderr.log &
          open_pid=$!
          sleep 5
          if ! kill -0 "$open_pid" 2>/dev/null; then
            cat gui-stderr.log >&2
            echo "Packaged macOS app exited during startup" >&2
            exit 1
          fi
          pkill -f "$app/Contents/MacOS/$BINARY_NAME" 2>/dev/null || true
          wait "$open_pid" 2>/dev/null || true
        shell: bash

      - name: Package Windows binary
        if: runner.os == 'Windows'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          mkdir -p "$package/web" "$package/assets"
          cp "target/$TARGET/release/$BINARY_NAME.exe" README.md LICENSE config.example.json "$package/"
          cp -R web/dist "$package/web/dist"
          cp assets/icon.png "$package/assets/icon.png"
          7z a "$package.zip" "./$package/*"
        shell: bash

      - name: Smoke-test packaged web UI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $package = "$env:BINARY_NAME-$env:TAG-$env:TARGET"
          $process = Start-Process -FilePath "$package/$env:BINARY_NAME.exe" `
            -ArgumentList "--serve-only", "--port", "4173" `
            -WorkingDirectory $package -PassThru -WindowStyle Hidden
          try {
            $response = $null
            for ($attempt = 0; $attempt -lt 20; $attempt++) {
              Start-Sleep -Milliseconds 500
              if ($process.HasExited) {
                throw "Packaged executable exited before serving the UI (code $($process.ExitCode))"
              }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:4173" -UseBasicParsing
                break
              } catch {}
            }
            if (-not $response -or $response.StatusCode -ne 200 -or $response.Content -notmatch '<div id="root">') {
              throw "Packaged executable did not serve the web UI"
            }
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

      - name: Smoke-test packaged web UI
        if: runner.os != 'Windows'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          "$package/$BINARY_NAME" --serve-only --port 4173 >smoke-stdout.log 2>smoke-stderr.log &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if ! kill -0 "$pid" 2>/dev/null; then
              cat smoke-stderr.log >&2
              echo "Packaged executable exited before serving the UI" >&2
              exit 1
            fi
            if response=$(curl --fail --silent http://127.0.0.1:4173); then
              echo "$response" | grep -q '<div id="root">'
              exit 0
            fi
            sleep 0.5
          done
          cat smoke-stderr.log >&2
          echo "Packaged executable did not serve the web UI" >&2
          exit 1
        shell: bash

      - name: Check Linux runtime libraries and GUI startup
        if: runner.os == 'Linux'
        env:
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          package="$BINARY_NAME-$TAG-$TARGET"
          if ldd "$package/$BINARY_NAME" | grep -q 'not found'; then
            ldd "$package/$BINARY_NAME" >&2
            exit 1
          fi
          set +e
          timeout 5s xvfb-run -a "$package/$BINARY_NAME" >gui-stdout.log 2>gui-stderr.log
          status=$?
          set -e
          if [ "$status" -ne 124 ]; then
            cat gui-stderr.log >&2
            echo "Packaged Linux GUI exited during startup (code $status)" >&2
            exit 1
          fi
        shell: bash

      - name: Upload directly to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BINARY_NAME: ${{ inputs['binary-name'] || 'launchpadx' }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: gh release upload "$TAG" "$BINARY_NAME-$TAG-$TARGET.$ARCHIVE" --clobber --repo "$GITHUB_REPOSITORY"
        shell: bash

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft after every platform succeeds
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
