name: Release

# Public source release only. Official binaries are distributed via Patreon.
# See OFFICIAL_BUILDS.md and .github/workflows/build-official-binaries.yml
on:
  push:
    tags:
      - "v*"

jobs:
  source-release:
    name: Create Source Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Source release

            This tag marks a source release. The repository remains open source under the [MIT License](LICENSE).

            ### Official pre-built binaries

            Official Windows, macOS, and Linux builds are available to [Patreon supporters](https://carapaceai.org/patreon). See [OFFICIAL_BUILDS.md](OFFICIAL_BUILDS.md) for terms.

            ### Build from source

            Clone this tag and follow the instructions in [README.md](README.md), or download the source archive below.