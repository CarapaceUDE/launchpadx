name: Release

on:
  push:
    tags:
          - 'v*'

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: codex-local-launcher
            artifact_ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: codex-local-launcher
            artifact_ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: codex-local-launcher-aarch64
            artifact_ext: ''
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: codex-local-launcher
            artifact_ext: ''
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact_name: codex-local-launcher-aarch64
            artifact_ext: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Build (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Build (macOS aarch64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          rustup target add ${{ matrix.target }}
          brew install FiloSottile/musl-cross/musl-cross
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=$(brew --prefix)/opt/musl-cross/bin/aarch64-unknown-linux-musl-gcc" >> $GITHUB_ENV
          cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Build (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Build (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cargo build --release --target ${{ matrix.target }} --target-dir target-aarch64
          mv target-aarch64/aarch64-unknown-linux-gnu/release/codex-local-launcher target/aarch64-unknown-linux-gnu/release/codex-local-launcher
        shell: bash

      - name: Prepare artifact
        run: |
          bin_path="target/${{ matrix.target }}/release/codex-local-launcher${{ matrix.artifact_ext }}"
          if [ "${{ matrix.artifact_ext }}" = ".exe" ]; then
            artifact="${{ matrix.artifact_name }}-${{ matrix.target }}.exe"
          else
            artifact="${{ matrix.artifact_name }}-${{ matrix.target }}"
          fi
          cp "$bin_path" "$artifact"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.target }}
          path: ${{ matrix.artifact_name }}${{ matrix.artifact_ext }}

  release:
    name: Create GitHub Release
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false